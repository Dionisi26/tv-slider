<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Slider Informasi - V2</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body.admin-body { display: block; padding: 2rem; background: #f4f4f9; }
        .cms-container { max-width: 900px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { font-weight: 600; margin-bottom: 5px; display: block; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        
        /* Styling Daftar Slide */
        .slide-list { margin-top: 2rem; border-top: 2px solid #eee; padding-top: 1rem; }
        .slide-item { background: #f8f9fa; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 6px; border: 1px solid #ddd; }
        
        .controls { display: flex; gap: 5px; align-items: center; }
        .btn-move { background: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-move:hover { background: #5a6268; }
        .btn-move:disabled { background: #ccc; cursor: not-allowed; }
        
        .btn-danger { background: #dc3545; padding: 8px 15px; font-size: 14px; border: none; color: white; cursor: pointer; border-radius: 4px; }
        .btn-danger:hover { background: #c82333; }
        .btn { display: inline-block; padding: 10px 24px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmrWXZ0T2bnGc617MyVD2xSl9J5JpVx1U",
            authDomain: "slidertv-antonius.firebaseapp.com",
            databaseURL: "https://slidertv-antonius-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "slidertv-antonius",
            storageBucket: "slidertv-antonius.firebasestorage.app",
            messagingSenderId: "528352311455",
            appId: "1:528352311455:web:11b613e9bcc0b46743caaa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbUpdate = update;
        window.dbOnValue = onValue;
        window.dbRemove = remove;
    </script>
</head>
<body class="admin-body">

    <div class="cms-container">
        <h2>🛠️ CMS Slider TV (V2 - Dengan Pengurutan)</h2>
        <a href="index.html" class="btn" style="margin-bottom: 20px;">Lihat Layar TV</a>
        
        <form id="cmsForm">
            <div class="form-group">
                <label>Pilih Tipe Tampilan Layar:</label>
                <select id="infoType">
                    <option value="text">Teks & Deskripsi (Background Warna)</option>
                    <option value="image">Gambar Penuh (Poster/Brosur)</option>
                </select>
            </div>

            <div id="textFields">
                <div class="form-group">
                    <label>Judul Informasi</label>
                    <input type="text" id="slideTitle">
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea id="slideDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Warna Background</label>
                    <input type="color" id="slideColor" value="#e0f2fe">
                </div>
            </div>

            <div id="imageFields" style="display:none;">
                <div class="form-group">
                    <label>URL Gambar (Direct Link)</label>
                    <input type="url" id="slideImage" placeholder="https://i.imgur.com/contoh.jpg">
                    <small style="color: #d9534f; font-weight: bold;">*Wajib akhiran .jpg / .png</small>
                </div>
            </div>

            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Tambah Slide Baru 🚀</button>
        </form>

        <div class="slide-list" id="adminSlideList">
            <h3>Daftar Slide Aktif di TV</h3>
        </div>
    </div>

    <script>
        const infoType = document.getElementById('infoType');
        const textFields = document.getElementById('textFields');
        const imageFields = document.getElementById('imageFields');

        infoType.addEventListener('change', () => {
            imageFields.style.display = infoType.value === 'image' ? 'block' : 'none';
            textFields.style.display = infoType.value === 'text' ? 'block' : 'none';
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
