<body class="admin-body">
    <div class="cms-container">
        <h2>🛠️ CMS Slider Informasi</h2>
        <a href="index.html" class="btn" style="margin-bottom: 20px; display: inline-block;">Lihat Hasil Slider</a>
        
        <form id="cmsForm">
            <div class="form-group">
                <label>Pilih Tipe Informasi:</label>
                <select id="infoType" style="width: 100%; padding: 10px; margin-bottom: 10px;">
                    <option value="text">Teks & Deskripsi</option>
                    <option value="image">Gambar Penuh (Poster)</option>
                </select>
            </div>

            <div id="textFields">
                <div class="form-group">
                    <label>Judul Informasi</label>
                    <input type="text" id="slideTitle">
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea id="slideDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Warna Background</label>
                    <input type="color" id="slideColor" value="#e0f2fe">
                </div>
            </div>

            <div id="imageFields" style="display:none;">
                <div class="form-group">
                    <label>URL Gambar (Paste Link Gambar di sini)</label>
                    <input type="url" id="slideImage" placeholder="https://link-gambar.com/foto.jpg">
                    <small>*Pastikan link gambar berakhiran .jpg, .png, atau .webp</small>
                </div>
            </div>

            <button type="submit" class="btn" style="margin-top: 10px;">Tambah Slide</button>
        </form>

        <div class="slide-list" id="adminSlideList">
            <h3>Daftar Slide Aktif</h3>
        </div>
    </div>

    <script>
        // Logika sederhana untuk ganti-ganti input di form
        const infoType = document.getElementById('infoType');
        const textFields = document.getElementById('textFields');
        const imageFields = document.getElementById('imageFields');

        infoType.addEventListener('change', () => {
            if(infoType.value === 'image') {
                imageFields.style.display = 'block';
                textFields.style.display = 'none';
            } else {
                imageFields.style.display = 'none';
                textFields.style.display = 'block';
            }
        });
    </script>
    <script src="script.js"></script>
</body>
