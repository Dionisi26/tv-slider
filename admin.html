<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Slider Informasi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body.admin-body { display: block; padding: 2rem; background: #f4f4f9; }
        .cms-container { max-width: 800px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .slide-list { margin-top: 2rem; }
        .slide-item { background: #eee; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        .btn-danger { background: #dc3545; padding: 5px 10px; font-size: 14px; border: none; color: white; cursor: pointer; border-radius: 4px;}
        .btn-danger:hover { background: #c82333; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmrWXZ0T2bnGc617MyVD2xSl9J5JpVx1U",
            authDomain: "slidertv-antonius.firebaseapp.com",
            databaseURL: "https://slidertv-antonius-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "slidertv-antonius",
            storageBucket: "slidertv-antonius.firebasestorage.app",
            messagingSenderId: "528352311455",
            appId: "1:528352311455:web:11b613e9bcc0b46743caaa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbOnValue = onValue;
    </script>
</head>
<body class="admin-body">

    <div class="cms-container">
        <h2>🛠️ CMS Slider Informasi</h2>
        <a href="index.html" class="btn" style="margin-bottom: 20px; display:inline-block;">Lihat Hasil Slider</a>
        
        <form id="cmsForm">
            <div class="form-group">
                <label>Judul Informasi</label>
                <input type="text" id="slideTitle" required>
            </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <textarea id="slideDesc" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>Warna Background (Hex/Nama Warna)</label>
                <input type="color" id="slideColor" value="#e0f2fe">
            </div>
            <div class="form-group">
                <label>URL Gambar Background (Opsional)</label>
                <input type="url" id="slideImage" placeholder="https://contoh.com/gambar.jpg">
            </div>
            <button type="submit" class="btn">Tambah Slide</button>
        </form>

        <div class="slide-list" id="adminSlideList">
            <h3>Daftar Slide Saat Ini</h3>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
